<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HaxBall: Dev Console</title>
    <style>
        body { background: #050505; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { border: 4px solid #333; background: #0e150e; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .ui { margin-bottom: 5px; font-size: 24px; font-weight: 900; }
        
        /* Geliştirici Paneli Tasarımı */
        #dev-panel {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 980px;
            border: 1px solid #444;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { cursor: pointer; accent-color: #00ffcc; }
        .val { color: #00ffcc; font-weight: bold; float: right; }
    </style>
</head>
<body>

    <div class="ui">SKOR: <span id="score">0 - 0</span></div>
    <canvas id="game"></canvas>

    <div id="dev-panel">
        <div class="control-group">
            <label>Oyuncu Hızı <span class="val" id="v-speed">3.5</span></label>
            <input type="range" id="p-speed" min="1" max="8" step="0.1" value="3.5">
            <label>Oyuncu İvmesi <span class="val" id="v-acc">0.22</span></label>
            <input type="range" id="p-acc" min="0.05" max="0.6" step="0.01" value="0.22">
        </div>
        <div class="control-group">
            <label>Şut Gücü <span class="val" id="v-kick">14</span></label>
            <input type="range" id="p-kick" min="5" max="25" step="1" value="14">
            <label>Şut Menzili <span class="val" id="v-range">15</span></label>
            <input type="range" id="p-range" min="5" max="40" step="1" value="15">
        </div>
        <div class="control-group">
            <label>Top Sürtünmesi <span class="val" id="v-fric">0.99</span></label>
            <input type="range" id="p-fric" min="0.95" max="0.999" step="0.001" value="0.99">
            <label>Duvar Sekmesi <span class="val" id="v-bounce">0.75</span></label>
            <input type="range" id="p-bounce" min="0.1" max="1.2" step="0.05" value="0.75">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 600;

        let scores = { p1: 0, bot: 0 };
        const keys = {};

        // Dinamik Ayarlar
        const cfg = {
            ballFric: 0.99,
            wallBounce: 0.75,
            kickRange: 15,
            kickPower: 14,
            controlStrength: 0.12
        };

        const ball = { x: 500, y: 300, r: 12, dx: 0, dy: 0 };
        const p1 = { x: 150, y: 300, r: 22, dx: 0, dy: 0, acc: 0.22, max: 3.5, f: 0.86, color: '#ff3333' };
        const bot = { x: 850, y: 300, r: 22, dx: 0, dy: 0, acc: 0.20, max: 3.3, f: 0.86, color: '#33bcff' };
        const posts = [{x: 0, y: 200}, {x: 0, y: 400}, {x: 1000, y: 200}, {x: 1000, y: 400}];

        // Panel Bağlantıları
        const setupControl = (id, targetObj, prop, valDisplayId) => {
            document.getElementById(id).oninput = (e) => {
                let val = parseFloat(e.target.value);
                targetObj[prop] = val;
                document.getElementById(valDisplayId).innerText = val;
            };
        };

        setupControl('p-speed', p1, 'max', 'v-speed');
        setupControl('p-acc', p1, 'acc', 'v-acc');
        setupControl('p-kick', cfg, 'kickPower', 'v-kick');
        setupControl('p-range', cfg, 'kickRange', 'v-range');
        setupControl('p-fric', cfg, 'ballFric', 'v-fric');
        setupControl('p-bounce', cfg, 'wallBounce', 'v-bounce');

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function reset() {
            ball.x = 500; ball.y = 300; ball.dx = 0; ball.dy = 0;
            p1.x = 150; p1.y = 300; p1.dx = 0; p1.dy = 0;
            bot.x = 850; bot.y = 300; bot.dx = 0; bot.dy = 0;
        }

        function wallPhysics(obj, isBall = false) {
            if (isBall && obj.y > 205 && obj.y < 395) {
                if (obj.x < -obj.r) { scores.bot++; reset(); }
                if (obj.x > canvas.width + obj.r) { scores.p1++; reset(); }
                document.getElementById('score').innerText = `${scores.p1} - ${scores.bot}`;
                return;
            }
            if (obj.x < obj.r) { obj.x = obj.r; obj.dx = -obj.dx * (isBall ? cfg.wallBounce : 0.5); }
            if (obj.x > canvas.width - obj.r) { obj.x = canvas.width - obj.r; obj.dx = -obj.dx * (isBall ? cfg.wallBounce : 0.5); }
            if (obj.y < obj.r) { obj.y = obj.r; obj.dy = -obj.dy * (isBall ? cfg.wallBounce : 0.5); }
            if (obj.y > canvas.height - obj.r) { obj.y = canvas.height - obj.r; obj.dy = -obj.dy * (isBall ? cfg.wallBounce : 0.5); }
        }

        function handleCollisions() {
            let d_pb = Math.hypot(p1.x - bot.x, p1.y - bot.y);
            if (d_pb < p1.r + bot.r) {
                let angle = Math.atan2(p1.y - bot.y, p1.x - bot.x);
                let overlap = (p1.r + bot.r - d_pb) + 0.5;
                p1.x += Math.cos(angle) * (overlap / 2); p1.y += Math.sin(angle) * (overlap / 2);
                bot.x -= Math.cos(angle) * (overlap / 2); bot.y -= Math.sin(angle) * (overlap / 2);
            }

            [p1, bot].forEach(p => {
                let dist = Math.hypot(ball.x - p.x, ball.y - p.y);
                let isBot = (p === bot);
                let isKicking = (!isBot && (keys['Numpad5'] || keys['Digit5'])) || (isBot && bot.willKick);

                if (dist < p.r + ball.r + 5) {
                    let angle = Math.atan2(ball.y - p.y, ball.x - p.x);
                    if (isKicking && dist < p.r + ball.r + cfg.kickRange) {
                        ball.dx = Math.cos(angle) * cfg.kickPower;
                        ball.dy = Math.sin(angle) * cfg.kickPower;
                    } else {
                        ball.dx += (p.dx - ball.dx) * 0.1;
                        ball.dy += (p.dy - ball.dy) * 0.1;
                        let mAngle = Math.atan2(p.dy, p.dx);
                        if (Math.hypot(p.dx, p.dy) > 0.1) {
                            ball.dx += Math.cos(mAngle) * cfg.controlStrength;
                            ball.dy += Math.sin(mAngle) * cfg.controlStrength;
                        }
                        if (dist < p.r + ball.r) {
                            ball.x = p.x + Math.cos(angle) * (p.r + ball.r + 1);
                            ball.y = p.y + Math.sin(angle) * (p.r + ball.r + 1);
                        }
                    }
                }
            });
        }

        function update() {
            if (keys['KeyW']) p1.dy -= p1.acc; if (keys['KeyS']) p1.dy += p1.acc;
            if (keys['KeyA']) p1.dx -= p1.acc; if (keys['KeyD']) p1.dx += p1.acc;

            bot.willKick = false;
            let dP1B = Math.hypot(p1.x - ball.x, p1.y - ball.y);
            if (ball.x < 550 || dP1B < 120) {
                let ty = 300 + (ball.y - 300) * 0.6; 
                if (bot.x < 920) bot.dx += bot.acc; else bot.dx -= bot.acc;
                if (bot.y < ty) bot.dy += bot.acc; else bot.dy -= bot.acc;
            } else {
                if (bot.x < ball.x + 30) bot.dx += bot.acc; else bot.dx -= bot.acc;
                if (bot.y < ball.y) bot.dy += bot.acc; else bot.dy -= bot.acc;
                if (Math.hypot(bot.x-ball.x, bot.y-ball.y) < bot.r+ball.r+cfg.kickRange) bot.willKick = true;
            }

            [p1, bot, ball].forEach(o => {
                o.x += o.dx; o.y += o.dy;
                o.dx *= (o === ball ? cfg.ballFric : o.f); 
                o.dy *= (o === ball ? cfg.ballFric : o.f);
            });

            handleCollisions();
            wallPhysics(p1); wallPhysics(bot); wallPhysics(ball, true);

            posts.forEach(p => {
                let d = Math.hypot(ball.x - p.x, ball.y - p.y);
                if (d < ball.r + 10) {
                    let a = Math.atan2(ball.y - p.y, ball.x - p.x);
                    let s = Math.hypot(ball.dx, ball.dy);
                    ball.dx = Math.cos(a) * (s + 1) * cfg.wallBounce;
                    ball.dy = Math.sin(a) * (s + 1) * cfg.wallBounce;
                }
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255,255,255,0.08)";
            ctx.strokeRect(0, 0, 1000, 600);
            ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,600); ctx.stroke();
            ctx.fillStyle = "#fff";
            posts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill(); });

            const render = (o, color, isP1 = false) => {
                ctx.save();
                if (isP1 && (keys['Numpad5'] || keys['Digit5'])) {
                    ctx.shadowBlur = 20; ctx.shadowColor = "#fff";
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(o.x, o.y, o.r + cfg.kickRange, 0, Math.PI*2); ctx.stroke();
                }
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            };
            render(ball, "#fff"); render(p1, p1.color, true); render(bot, bot.color);
        }
        update();
    </script>
</body>
</html>
